name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Test
        run: zig build test --summary all
      - name: Build examples
        run: zig build examples

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows
          - aarch64-windows
          - wasm32-wasi
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Build
        run: zig build -Dtarget=${{ matrix.target }}
      - name: Build examples
        run: zig build examples -Dtarget=${{ matrix.target }}

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Fuzz (5000 iterations)
        run: zig build fuzz -- --iters 5000

  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Install git and python3
        run: sudo apt-get update && sudo apt-get install -y git python3
      - name: Build differential binary
        run: zig build install
      - name: Run differential harness
        run: tools/run_differential.sh
