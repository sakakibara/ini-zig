# Application configuration (small fixture for benchmarks)

[general]
name = my-app
version = 1.2.3
debug = false
log_level = info

[server]
host = 127.0.0.1
port = 8080
timeout = 30
max_connections = 100

[database]
host = localhost
port = 5432
name = appdb
user = appuser
password = secret
pool_size = 10
pool_timeout = 5

[cache]
backend = redis
host = localhost
port = 6379
ttl = 300
max_entries = 10000

[logging]
file = /var/log/app.log
level = warn
rotate = daily
max_size = 100
keep = 7
